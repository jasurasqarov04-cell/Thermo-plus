  <nav class="bottom-nav">
    <a class="nav-item" href="about.html"><span class="nav-icon">🏠</span><span class="nav-label" data-i18n="home">Home</span></a>
    <a class="nav-item" href="index.html"><span class="nav-icon">📦</span><span class="nav-label" data-i18n="catalog">Catalog</span></a>
    <a class="nav-item" href="calculator.html"><span class="nav-icon">🧮</span><span class="nav-label" data-i18n="calculator">Calculator</span></a>
    <a class="nav-item" href="favorites.html"><span class="nav-icon">❤️</span><span class="nav-label" data-i18n="favorites">Favorites</span></a>
    <a class="nav-item active" href="contacts.html"><span class="nav-icon">📞</span><span class="nav-label" data-i18n="contacts">Contacts</span></a>

<script src="i18n.js"></script>
<script src="app.js"></script>

    addrRows:[['🏭',"Ishlab chiqarish","Xorazm viloyati, Urganch sh., Sanoatchilar ko'chasi, 1"],['🏢','Sotish ofisi',"Toshkent sh., Yunusobod tumani, Shahrisabz ko'chasi, 2"]],
    certTitle:'🏅 Sertifikatlar',

  },
  ru: {
    logoSub:"Производитель базальтовой ваты",
    addr:"🏭 Хорезмская обл., г.Ургенч, ул.Саноатчилар, 1 — производство<br/>🏢 Ташкент, Юнусабадский р-н, ул.Шахрисабз, 2 — офис",
    contacts:[
      {icon:'📞',key:'ТЕЛЕФОН',val:'+998 90 150 00 00',href:'tel:+998901500000',act:'Позвонить'},
      {icon:'✉️',key:'EMAIL',val:'info@thermoplus.uz',href:'mailto:info@thermoplus.uz',act:'Написать'},
      {icon:'🌐',key:'САЙТ',val:'thermoplus.uz',href:'https://thermoplus.uz',act:'Открыть'},
      {icon:'💬',key:'TELEGRAM',val:'@thermoplus',href:'https://t.me/+998901500000',act:'Написать'},
      {icon:'📱',key:'WHATSAPP',val:'+998 90 150 00 00',href:'https://wa.me/998901500000',act:'Написать'},

    hours:[['Понедельник–Пятница','9:00–18:00'],['Суббота','9:00–15:00'],['Воскресенье','Выходной']],

    addrRows:[['🏭','Производство','Хорезмская обл., г.Ургенч, ул.Саноатчилар, 1'],['🏢','Офис продаж','Ташкент, Юнусабадский р-н, ул.Шахрисабз, 2']],

    contacts:[
      {icon:'📞',key:'PHONE',val:'+998 90 150 00 00',href:'tel:+998901500000',act:'Call'},

    dealerTitle:'🤝 Become a dealer',
    dealerText:'We invite distributors across Uzbekistan. Favorable partnership terms.',
    dealerBtn:'📞 Call us',
  }

function renderContacts() {
  const lang = getCurrentLang();
  const tx = CONTACTS_TX[lang] || CONTACTS_TX.en;
  document.getElementById('logo-sub').textContent = tx.logoSub;
  document.getElementById('comp-addr').innerHTML = tx.addr;
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));

  const contactsHtml = tx.contacts.map(c => `
    <div class="contact-card">
      <div class="contact-icon-box">${c.icon}</div>
      <div>
        <div class="contact-key">${c.key}</div>
        <div class="contact-val">${c.val}</div>
      </div>
      <div class="contact-act">
        <a href="${c.href}" target="_blank" rel="noreferrer" style="text-decoration:none">
          <button class="contact-act-btn">${c.act}</button>
        </a>
      </div>
    </div>`).join('');

  const hoursHtml = tx.hours.map(([d,time]) => `
    <div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="color:var(--gray)">${d}</span>
      <b style="color:${time.includes('Yopiq')||time.includes('Closed')||time.includes('Выходной')?'var(--red)':'var(--green)'}">${time}</b>
    </div>`).join('');

  const addrHtml = tx.addrRows.map(([icon,type,addr]) => `
    <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:18px">${icon}</span>
      <div>
        <div style="font-size:10px;color:var(--gray);font-weight:600;margin-bottom:2px">${type}</div>
        <div style="font-size:12px;font-weight:600">${addr}</div>
      </div>
    </div>`).join('');

  const certHtml = tx.certs.map(c => `
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0">
      <span style="color:var(--orange);font-size:15px">✓</span>${c}
    </div>`).join('');

  document.getElementById('contacts-body').innerHTML = `
    ${contactsHtml}
    <div class="card" style="padding:14px;margin-bottom:12px">
      <div style="font-family:var(--f-display);font-size:16px;letter-spacing:.3px;margin-bottom:10px">${tx.hoursTitle}</div>
      ${hoursHtml}
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px">
      <div style="font-family:var(--f-display);font-size:16px;letter-spacing:.3px;margin-bottom:10px">${tx.addrTitle}</div>
      ${addrHtml}
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px">
      <div style="font-family:var(--f-display);font-size:16px;letter-spacing:.3px;margin-bottom:10px">${tx.certTitle}</div>
      ${certHtml}
    </div>
    <div class="promo-banner" style="margin-bottom:20px;margin-left:0;margin-right:0">
      <div class="promo-title">${tx.dealerTitle}</div>
      <div class="promo-text">${tx.dealerText}</div>
      <a href="tel:+998901500000" style="text-decoration:none">
        <button class="btn-white">${tx.dealerBtn}</button>
      </a>
    </div>`;
}

function onLangChange() { renderContacts(); }
initLangButtons();
renderContacts();
</script>
</body>
</html>
