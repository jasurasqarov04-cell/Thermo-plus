    contacts:[
      {icon:'📞', key:'ТЕЛЕФОН',  val:'+998 90 150 00 00', href:'tel:+998901500000',   act:'Позвонить'},
      {icon:'✉️', key:'EMAIL',   val:'info@thermoplus.uz', href:'mailto:info@thermoplus.uz', act:'Написать'},

  }

function renderContacts() {
  const lang = getCurrentLang();
  const tx = CONTACTS_TX[lang] || CONTACTS_TX.ru;

  document.getElementById('logo-sub').textContent = tx.logoSub;
  document.getElementById('comp-addr').innerHTML = tx.addr;
  document.getElementById('page-title').textContent = tx.pageTitle;
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));

  const contactsHtml = tx.contacts.map(c => `
    <div class="contact-card" style="margin-bottom:8px">
      <div class="contact-icon-box">${c.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="contact-key">${c.key}</div>
        <div class="contact-val">${c.val}</div>
      </div>
      <div class="contact-act">
        <a href="${c.href}" target="_blank" rel="noreferrer" style="text-decoration:none">
          <button class="contact-act-btn">${c.act}</button>
        </a>
      </div>
    </div>`).join('');

  const hoursHtml = tx.hours.map(([day, time, closed]) => `
    <div class="hours-row">
      <span class="hours-day">${day}</span>
      <span class="hours-time ${closed ? 'closed' : ''}">${time}</span>
    </div>`).join('');

  const addrHtml = tx.addrRows.map(([type, addr]) => `
    <div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">${type}</div>
      <div style="font-size:13px;font-weight:600;color:var(--text);line-height:1.4">${addr}</div>
    </div>`).join('');

  const certHtml = tx.certs.map(c => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text)">
      <span style="width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;display:block"></span>
      ${c}
    </div>`).join('');

  document.getElementById('contacts-body').innerHTML = `
    ${contactsHtml}

    <div class="section-card" style="margin-top:4px">
      <div class="section-card-title">${tx.hoursTitle}</div>
      ${hoursHtml}
    </div>

    <div class="section-card">
      <div class="section-card-title">${tx.addrTitle}</div>
      <div style="padding-bottom:4px">${addrHtml}</div>
    </div>

    <div class="section-card">
      <div class="section-card-title">${tx.certTitle}</div>
      ${certHtml}
    </div>

    <div class="cta-banner" style="margin:0 0 20px">
      <div class="cta-banner-title">${tx.dealerTitle}</div>
      <div class="cta-banner-sub">${tx.dealerText}</div>
      <a href="tel:+998901500000" style="text-decoration:none">
        <button class="btn-white">${tx.dealerBtn}</button>
      </a>
    </div>`;
}

function onLangChange() { renderContacts(); }
initLangButtons();
renderContacts();
Cart.updateBadge();
</script>
