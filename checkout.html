<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>THERMO PLUS — Order</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">
  <header class="header">
    <a class="logo" href="index.html">
      <div class="logo-mark">
        <img src="images/logo.png" alt="THERMO PLUS" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="logo-mark-fallback" style="display:none">🔥</span>
      </div>
      <div>
        <div class="logo-text">THERMO PLUS</div>
        <div class="logo-sub">Basalt wool</div>
      </div>
    </a>
    <div class="lang-wrap">
      <button class="lang-btn" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </header>

  <div class="page">
    <div style="display:flex;background:white;border-bottom:1px solid var(--border)" id="step-tabs">
      <div id="tab-0" style="flex:1;padding:12px;text-align:center;border-bottom:2px solid var(--orange);cursor:pointer" onclick="goStep(0)">
        <div style="font-size:11px;font-weight:700;color:var(--orange)" id="tab-label-0">🛒 Cart</div>
      </div>
      <div id="tab-1" style="flex:1;padding:12px;text-align:center;border-bottom:2px solid transparent;cursor:pointer;opacity:.5" onclick="goStep(1)">
        <div style="font-size:11px;font-weight:700;color:var(--gray)" id="tab-label-1">📝 Details</div>
      </div>
      <div id="tab-2" style="flex:1;padding:12px;text-align:center;border-bottom:2px solid transparent;cursor:pointer;opacity:.5">
        <div style="font-size:11px;font-weight:700;color:var(--gray)" id="tab-label-2">✅ Done</div>
      </div>
    </div>
    <div id="step-content" style="padding:18px 16px"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="about.html"><span class="nav-icon">🏠</span><span class="nav-label" data-i18n="home">Home</span></a>
    <a class="nav-item" href="index.html"><span class="nav-icon">📦</span><span class="nav-label" data-i18n="catalog">Catalog</span></a>
    <a class="nav-item" href="calculator.html"><span class="nav-icon">🧮</span><span class="nav-label" data-i18n="calculator">Calculator</span></a>
    <a class="nav-item" href="favorites.html"><span class="nav-icon">❤️</span><span class="nav-label" data-i18n="favorites">Favorites</span></a>
    <a class="nav-item" href="contacts.html"><span class="nav-icon">📞</span><span class="nav-label" data-i18n="contacts">Contacts</span></a>
  </nav>
</div>
<script src="i18n.js"></script>
<script src="app.js"></script>
<script src="checkout.js"></script>
<script>
if (window.Telegram?.WebApp) Telegram.WebApp.ready();
function onLangChange() { renderStep(); }
initLangButtons();
renderStep();
</script>
</body>
</html>
