<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>THERMO PLUS — Order</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">
  <header class="header">
    <a class="logo" href="index.html">
      <div class="logo-mark">
        <img src="images/logo.png" alt="THERMO PLUS" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="logo-mark-fallback" style="display:none">🔥</span>
      </div>
      <div>
        <div class="logo-text">THERMO PLUS</div>
        <div class="logo-sub">Basalt wool</div>
      </div>
    </a>
    <div class="lang-wrap">
      <button class="lang-btn" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </header>

  <div class="page">
    <div style="display:flex;background:white;border-bottom:1px solid var(--border)" id="step-tabs">
      <div id="tab-0" style="flex:1;padding:12px;text-align:center;border-bottom:2px solid var(--orange);cursor:pointer" onclick="goStep(0)">
        <div style="font-size:11px;font-weight:700;color:var(--orange)" id="tab-label-0">🛒 Cart</div>
      </div>
      <div id="tab-1" style="flex:1;padding:12px;text-align:center;border-bottom:2px solid transparent;cursor:pointer;opacity:.5" onclick="goStep(1)">
        <div style="font-size:11px;font-weight:700;color:var(--gray)" id="tab-label-1">📝 Details</div>
      </div>
      <div id="tab-2" style="flex:1;padding:12px;text-align:center;border-bottom:2px solid transparent;cursor:pointer;opacity:.5">
        <div style="font-size:11px;font-weight:700;color:var(--gray)" id="tab-label-2">✅ Done</div>
      </div>
    </div>
    <div id="step-content" style="padding:18px 16px"></div>
  </div>
  <nav class="bottom-nav">
    <a class="nav-item" href="about.html" data-page="home">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8A8A84" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      <span class="nav-label" data-i18n="home">Home</span>
    </a>
    <a class="nav-item" href="index.html" data-page="catalog">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8A8A84" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="7" height="7"/><rect x="15" y="3" width="7" height="7"/><rect x="15" y="14" width="7" height="7"/><rect x="2" y="14" width="7" height="7"/></svg></span>
      <span class="nav-label" data-i18n="catalog">Catalog</span>
    </a>
    <a class="nav-item" href="calculator.html" data-page="calc">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8A8A84" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/><line x1="8" y1="6" x2="16" y2="6"/></svg></span>
      <span class="nav-label" data-i18n="calculator">Calculator</span>
    </a>
    <a class="nav-item" href="favorites.html" data-page="favs">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8A8A84" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>
      <span class="nav-label" data-i18n="favorites">Favorites</span>
    </a>
    <a class="nav-item" href="contacts.html" data-page="contacts">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8A8A84" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.37 2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.7a16 16 0 0 0 5.39 5.39l.98-.98a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7a2 2 0 0 1 1.8 2.06z"/></svg></span>
      <span class="nav-label" data-i18n="contacts">Contacts</span>
    </a>
  </nav>
</div>
<script src="i18n.js"></script>
<script src="app.js"></script>
<script src="checkout.js"></script>
<script>
if (window.Telegram?.WebApp) Telegram.WebApp.ready();
function onLangChange() { renderStep(); }
initLangButtons();
renderStep();
</script>
</body>
</html>
