<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>THERMO PLUS — Корзина</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">

  <header class="header">
    <a class="logo" href="index.html">
      <div class="logo-mark">
        <img src="images/logo.png" alt="THERMO PLUS"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="logo-mark-fallback" style="display:none">T+</span>
      </div>
      <div>
        <div class="logo-text">THERMO PLUS</div>
        <div class="logo-sub" id="page-sub">Корзина</div>
      </div>
    </a>
    <div class="lang-wrap">
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </header>

  <div class="page">
    <!-- Tabs -->
    <div class="checkout-tabs" id="step-tabs">
      <div class="checkout-tab active" id="tab-0" onclick="goStep(0)">
        <span id="tab-label-0">Корзина</span>
      </div>
      <div class="checkout-tab" id="tab-1" onclick="goStep(1)">
        <span id="tab-label-1">Данные</span>
      </div>
      <div class="checkout-tab" id="tab-2">
        <span id="tab-label-2">Готово</span>
      </div>
    </div>
    <div id="step-content" style="padding:16px"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="about.html">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      </span>
      <span class="nav-label" data-i18n="home">Главная</span>
    </a>
    <a class="nav-item" href="index.html">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      </span>
      <span class="nav-label" data-i18n="catalog">Каталог</span>
    </a>
    <a class="nav-item active nav-item-cart" href="checkout.html">
      <span class="nav-icon">
        <span class="nav-icon-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-count nav-cart-badge" style="display:none">0</span>
        </span>
      </span>
      <span class="nav-label" data-i18n="cart">Корзина</span>
    </a>
    <a class="nav-item" href="calculator.html">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
      </span>
      <span class="nav-label" data-i18n="calculator">Калькулятор</span>
    </a>
    <a class="nav-item" href="contacts.html">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.37 2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.7a16 16 0 0 0 5.39 5.39l.98-.98a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 15.93l.01 1z"/></svg>
      </span>
      <span class="nav-label" data-i18n="contacts">Контакты</span>
    </a>
  </nav>

</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
<script src="checkout.js"></script>
<script>
if (window.Telegram?.WebApp) Telegram.WebApp.ready();
function onLangChange() { renderStep(); }
initLangButtons();
renderStep();
</script>
</body>
</html>
