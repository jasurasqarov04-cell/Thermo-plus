<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>THERMO PLUS — Catalog</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">

  <header class="header">
    <a class="logo" href="about.html">
      <div class="logo-mark">
        <img src="images/logo.png" alt="THERMO PLUS" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="logo-mark-fallback" style="display:none">🔥</span>
      </div>
      <div>
        <div class="logo-text">THERMO PLUS</div>
        <div class="logo-sub" id="logo-sub">Basalt wool manufacturer</div>
      </div>
    </a>
    <div class="lang-wrap">
      <button class="lang-btn" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </header>

  <div class="page">
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text"
          placeholder="Search products..." data-i18n-placeholder="search"/>
        <button class="search-clear hidden" id="search-clear-btn" onclick="clearSearch()">✕</button>
      </div>
    </div>

    <div class="cat-scroll" id="cat-scroll"></div>
    <div class="prod-grid" id="prod-grid"></div>
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title" data-i18n="noResults">Not found</div>
      <div class="empty-text" data-i18n="noResultsText">Try a different query</div>
    </div>
  </div>

  <button class="float-cart" id="float-cart-btn" onclick="location.href='checkout.html'" style="display:none">
    🛒 <span data-i18n="cart">Cart</span>
    <span class="float-badge cart-count">0</span>
  </button>

  <nav class="bottom-nav">
    <a class="nav-item" href="about.html" data-page="home"><span class="nav-icon">🏠</span><span class="nav-label" data-i18n="home">Home</span></a>
    <a class="nav-item active" href="index.html" data-page="catalog"><span class="nav-icon">📦</span><span class="nav-label" data-i18n="catalog">Catalog</span></a>
    <a class="nav-item" href="calculator.html" data-page="calc"><span class="nav-icon">🧮</span><span class="nav-label" data-i18n="calculator">Calculator</span></a>
    <a class="nav-item" href="favorites.html" data-page="favs"><span class="nav-icon">❤️</span><span class="nav-label" data-i18n="favorites">Favorites</span></a>
    <a class="nav-item" href="contacts.html" data-page="contacts"><span class="nav-icon">📞</span><span class="nav-label" data-i18n="contacts">Contacts</span></a>
  </nav>

</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
<script>
const CATEGORIES_LIST = [
  { key:'all', icon:'🔷' },
  { key:'facade', icon:'🧱' },
  { key:'vent', icon:'🌬️' },
  { key:'roof', icon:'🏗️' },
  { key:'floor', icon:'🔲' },
  { key:'universal', icon:'⭐' },
  { key:'sandwich', icon:'🏭' },
];

let activeCat = 'all';
let searchQuery = '';

function getCatLabel(key, lang) {
  if (key === 'all') return lang === 'uz' ? 'Hammasi' : lang === 'ru' ? 'Все' : 'All';
  return (CAT_LABELS[lang] || CAT_LABELS['en'])[key] || key;
}

function renderCategories() {
  const lang = getCurrentLang();
  document.getElementById('cat-scroll').innerHTML = CATEGORIES_LIST.map(c => `
    <div class="cat-chip ${activeCat===c.key?'active':''}" onclick="filterCat('${c.key}')">
      ${c.icon} ${getCatLabel(c.key, lang)}
    </div>`).join('');
}

function filterCat(key) {
  activeCat = key;
  renderCategories();
  renderProducts();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear-btn').classList.add('hidden');
  renderProducts();
}

function renderProducts() {
  const lang = getCurrentLang();
  const filtered = PRODUCTS_DATA.filter(p => {
    const catOk = activeCat === 'all' || p.category === activeCat;
    const q = searchQuery.toLowerCase();
    const searchOk = !q || p.name.toLowerCase().includes(q) || p.category.includes(q)
      || (p.desc_uz||'').toLowerCase().includes(q)
      || (p.desc_ru||'').toLowerCase().includes(q);
    return catOk && searchOk;
  });
  const grid = document.getElementById('prod-grid');
  const empty = document.getElementById('empty-state');
  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    grid.innerHTML = filtered.map(p => buildProductCard(p, thickState[p.id])).join('');
  }
  Cart.updateBadge();
}

function onLangChange() {
  document.getElementById('logo-sub').textContent = t('appSub');
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = t(el.getAttribute('data-i18n-placeholder')));
  renderCategories();
  renderProducts();
}

async function init() {
  if (window.Telegram?.WebApp) Telegram.WebApp.ready();
  initLangButtons();
  document.getElementById('logo-sub').textContent = t('appSub');
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
  await loadProducts();
  renderCategories();
  renderProducts();
  initFloatCart();
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    document.getElementById('search-clear-btn').classList.toggle('hidden', !searchQuery);
    renderProducts();
  });
}

init();
</script>
</body>
</html>
