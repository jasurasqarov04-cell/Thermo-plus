<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>THERMO PLUS — Katalog</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    .thick-sel-btn{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:none;color:var(--dark);transition:.15s}
    .thick-sel-btn.active{border-color:var(--orange);color:var(--orange);background:var(--orange-bg)}
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <a class="logo" href="index.html">
      <div class="logo-box">🔥</div>
      <div>
        <div class="logo-text">THERMO PLUS</div>
        <div class="logo-sub">Bazalt vata ishlab chiqaruvchi</div>
      </div>
    </a>
    <div class="lang-wrap">
      <button class="lang-btn active" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
    </div>
  </header>

  <!-- PAGE -->
  <div class="page">

    <!-- SEARCH -->
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text"
          placeholder="Mahsulot qidirish..." data-i18n-placeholder="search"/>
        <button class="search-clear hidden" id="search-clear-btn" onclick="clearSearch()">✕</button>
      </div>
    </div>

    <!-- CATEGORY CHIPS -->
    <div class="cat-scroll" id="cat-scroll"></div>

    <!-- PRODUCT GRID -->
    <div class="prod-grid" id="prod-grid"></div>

    <!-- EMPTY STATE -->
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title" data-i18n="noResults">Topilmadi</div>
      <div class="empty-text" data-i18n="noResultsText">Boshqa so'z kiriting</div>
    </div>
  </div>

  <!-- FLOAT CART -->
  <button class="float-cart" id="float-cart-btn" onclick="location.href='checkout.html'" style="display:none">
    🛒 <span data-i18n="cart">Savat</span>
    <span class="float-badge cart-count">0</span>
  </button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a class="nav-item" href="about.html" data-page="home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label" data-i18n="home">Asosiy</span>
    </a>
    <a class="nav-item active" href="index.html" data-page="catalog">
      <span class="nav-icon">📦</span>
      <span class="nav-label" data-i18n="catalog">Katalog</span>
    </a>
    <a class="nav-item" href="calculator.html" data-page="calc">
      <span class="nav-icon">🧮</span>
      <span class="nav-label" data-i18n="calculator">Kalkulyator</span>
    </a>
    <a class="nav-item" href="favorites.html" data-page="favs">
      <span class="nav-icon">❤️</span>
      <span class="nav-label" data-i18n="favorites">Sevimlilar</span>
    </a>
    <a class="nav-item" href="contacts.html" data-page="contacts">
      <span class="nav-icon">📞</span>
      <span class="nav-label" data-i18n="contacts">Aloqa</span>
    </a>
  </nav>

</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
<script>

const CATEGORIES_LIST = [
  { key:'all',   icon:'🔷' },
  { key:'facade',icon:'🧱' },
  { key:'vent',  icon:'🌬️' },
  { key:'roof',  icon:'🏗️' },
  { key:'floor', icon:'🔲' },
  { key:'universal',icon:'⭐' },
  { key:'sandwich',icon:'🏭' },
];

let activeCat = 'all';
let searchQuery = '';

function renderCategories() {
  const lang = getCurrentLang();
  const labels = { all: lang==='uz'?'Hammasi':'Все', ...CAT_LABELS[lang] };
  document.getElementById('cat-scroll').innerHTML = CATEGORIES_LIST.map(c => `
    <div class="cat-chip ${activeCat===c.key?'active':''}" onclick="filterCat('${c.key}')">
      ${c.icon} ${labels[c.key] || c.key}
    </div>`).join('');
}

function filterCat(key) {
  activeCat = key;
  renderCategories();
  renderProducts();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear-btn').classList.add('hidden');
  renderProducts();
}

function renderProducts() {
  const lang = getCurrentLang();
  const filtered = PRODUCTS_DATA.filter(p => {
    const catOk = activeCat === 'all' || p.category === activeCat;
    const q = searchQuery.toLowerCase();
    const searchOk = !q || p.name.toLowerCase().includes(q) || p.category.includes(q)
      || (lang==='uz'?p.desc_uz:p.desc_ru).toLowerCase().includes(q);
    return catOk && searchOk;
  });
  const grid = document.getElementById('prod-grid');
  const empty = document.getElementById('empty-state');
  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    grid.innerHTML = filtered.map(p => buildProductCard(p, thickState[p.id])).join('');
  }
  Cart.updateBadge();
}

function onLangChange() {
  renderCategories();
  renderProducts();
}

async function init() {
  if (window.Telegram?.WebApp) Telegram.WebApp.ready();
  initLangButtons();
  await loadProducts();
  renderCategories();
  renderProducts();
  initFloatCart();

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    const clearBtn = document.getElementById('search-clear-btn');
    clearBtn.classList.toggle('hidden', !searchQuery);
    renderProducts();
  });
}

init();
</script>
</body>
</html>
