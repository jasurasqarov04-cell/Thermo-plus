<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>THERMO PLUS — Sevimlilar</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    .thick-sel-btn{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:none;color:var(--dark);transition:.15s}
    .thick-sel-btn.active{border-color:var(--orange);color:var(--orange);background:var(--orange-bg)}
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <a class="logo" href="about.html">
      <div class="logo-box">🔥</div>
      <div>
        <div class="logo-text">THERMO PLUS</div>
        <div class="logo-sub">Bazalt vata</div>
      </div>
    </a>
    <div class="lang-wrap">
      <button class="lang-btn active" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
    </div>
  </header>

  <div class="page">
    <div style="padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-family:'Montserrat',sans-serif;font-size:17px;font-weight:900" id="page-title">
        ❤️ Sevimlilar
      </div>
      <button onclick="clearFavs()" id="clear-btn"
        style="background:none;border:none;font-size:11px;font-weight:700;color:#ef4444;cursor:pointer;display:none">
        <span id="clear-label">Hammasini o'chirish</span>
      </button>
    </div>
    <div class="prod-grid" id="fav-grid"></div>
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-icon">❤️</div>
      <div class="empty-title" id="empty-title">Sevimlilar yo'q</div>
      <div class="empty-text" id="empty-text">Mahsulot kartasidagi ❤️ ni bosing</div>
      <a href="index.html" class="btn-orange mt12" style="margin:16px auto 0;text-decoration:none">
        📦 <span id="go-catalog">Katalogga o'tish</span>
      </a>
    </div>
  </div>

  <!-- FLOAT CART -->
  <button class="float-cart" id="float-cart-btn" onclick="location.href='checkout.html'" style="display:none">
    🛒 <span data-i18n="cart">Savat</span>
    <span class="float-badge cart-count">0</span>
  </button>

  <nav class="bottom-nav">
    <a class="nav-item" href="about.html" data-page="home"><span class="nav-icon">🏠</span><span class="nav-label" data-i18n="home">Asosiy</span></a>
    <a class="nav-item" href="index.html" data-page="catalog"><span class="nav-icon">📦</span><span class="nav-label" data-i18n="catalog">Katalog</span></a>
    <a class="nav-item" href="calculator.html" data-page="calc"><span class="nav-icon">🧮</span><span class="nav-label" data-i18n="calculator">Kalkulyator</span></a>
    <a class="nav-item active" href="favorites.html" data-page="favs"><span class="nav-icon">❤️</span><span class="nav-label" data-i18n="favorites">Sevimlilar</span></a>
    <a class="nav-item" href="contacts.html" data-page="contacts"><span class="nav-icon">📞</span><span class="nav-label" data-i18n="contacts">Aloqa</span></a>
  </nav>

</div>
<script src="i18n.js"></script>
<script src="app.js"></script>
<script src="favorites.js"></script>
<script>
if (window.Telegram?.WebApp) Telegram.WebApp.ready();
async function init() {
  initLangButtons();
  await loadProducts();
  renderFavs();
  initFloatCart();
}
function onLangChange() { renderFavs(); }
init();
</script>
</body>
</html>
