<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>THERMO PLUS — Calculator</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">
  <header class="header">
    <a class="logo" href="about.html">
      <div class="logo-mark">
        <img src="images/logo.png" alt="THERMO PLUS" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="logo-mark-fallback" style="display:none">🔥</span>
      </div>
      <div>
        <div class="logo-text">THERMO PLUS</div>
        <div class="logo-sub">Basalt wool</div>
      </div>
    </a>
    <div class="lang-wrap">
      <button class="lang-btn" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </header>

  <div class="page">
    <div style="padding:16px 16px 0" id="calc-top">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-family:var(--f-display);font-size:22px;letter-spacing:.3px" id="page-title">🧮 Calculator</div>
        <button id="back-btn" onclick="prevStep()" class="btn-outline" style="display:none">← <span id="back-label">Back</span></button>
      </div>
      <div class="calc-progress"><div class="calc-progress-bar" id="progress-bar" style="width:0%"></div></div>
    </div>
    <div style="padding:0 16px 24px" id="calc-body"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="about.html"><span class="nav-icon">🏠</span><span class="nav-label" data-i18n="home">Home</span></a>
    <a class="nav-item" href="index.html"><span class="nav-icon">📦</span><span class="nav-label" data-i18n="catalog">Catalog</span></a>
    <a class="nav-item active" href="calculator.html"><span class="nav-icon">🧮</span><span class="nav-label" data-i18n="calculator">Calculator</span></a>
    <a class="nav-item" href="favorites.html"><span class="nav-icon">❤️</span><span class="nav-label" data-i18n="favorites">Favorites</span></a>
    <a class="nav-item" href="contacts.html"><span class="nav-icon">📞</span><span class="nav-label" data-i18n="contacts">Contacts</span></a>
  </nav>
</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
<script src="calculator.js"></script>
<script>
if (window.Telegram?.WebApp) Telegram.WebApp.ready();
async function init() {
  initLangButtons();
  await loadProducts();
  renderCalcStep();
}
function onLangChange() { renderCalcStep(); }
init();
</script>
</body>
</html>
