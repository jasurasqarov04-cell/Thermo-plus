<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>THERMO PLUS — Kalkulyator</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">

  <header class="header">
    <a class="logo" href="about.html">
      <div class="logo-box">🔥</div>
      <div>
        <div class="logo-text">THERMO PLUS</div>
        <div class="logo-sub">Bazalt vata</div>
      </div>
    </a>
    <div class="lang-wrap">
      <button class="lang-btn active" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="ru">RU</button>
    </div>
  </header>

  <div class="page">
    <div style="padding:16px 16px 0" id="calc-top">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-family:'Montserrat',sans-serif;font-size:17px;font-weight:900" id="page-title">🧮 Kalkulyator</div>
        <button id="back-btn" onclick="prevStep()" class="btn-outline" style="display:none">← <span id="back-label">Orqaga</span></button>
      </div>
      <div class="calc-progress"><div class="calc-progress-bar" id="progress-bar" style="width:0%"></div></div>
    </div>

    <div style="padding:0 16px 24px" id="calc-body"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a class="nav-item" href="about.html" data-page="home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label" data-i18n="home">Asosiy</span>
    </a>
    <a class="nav-item" href="index.html" data-page="catalog">
      <span class="nav-icon">📦</span>
      <span class="nav-label" data-i18n="catalog">Katalog</span>
    </a>
    <a class="nav-item active" href="calculator.html" data-page="calc">
      <span class="nav-icon">🧮</span>
      <span class="nav-label" data-i18n="calculator">Kalkulyator</span>
    </a>
    <a class="nav-item" href="favorites.html" data-page="favs">
      <span class="nav-icon">❤️</span>
      <span class="nav-label" data-i18n="favorites">Sevimlilar</span>
    </a>
    <a class="nav-item" href="contacts.html" data-page="contacts">
      <span class="nav-icon">📞</span>
      <span class="nav-label" data-i18n="contacts">Aloqa</span>
    </a>
  </nav>

</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
<script src="calculator.js"></script>
<script>
if (window.Telegram?.WebApp) Telegram.WebApp.ready();
async function init() {
  initLangButtons();
  await loadProducts();
  renderCalcStep();
}
function onLangChange() { renderCalcStep(); }
init();
</script>
</body>
</html>
